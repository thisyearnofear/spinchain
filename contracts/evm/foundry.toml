[profile.default]
src = "src"
out = "cache/out"
libs = ["node_modules", "lib"]
solc = "0.8.27"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
  "forge-std/=lib/forge-std/src/",
  "verifiers/=../verifiers/"
]
# HonkVerifier.sol is in src-honk/ and compiled via FOUNDRY_PROFILE=honk
# because it triggers "stack too deep" with via_ir enabled.
auto_detect_solc = false

[profile.honk]
src = "src-honk"
out = "cache/out"
libs = ["node_modules", "lib"]
solc = "0.8.27"
optimizer = true
optimizer_runs = 1
via_ir = false
evm_version = "cancun"
remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
  "forge-std/=lib/forge-std/src/",
  "verifiers/=../verifiers/"
]

[rpc_endpoints]
fuji = "https://api.avax-test.network/ext/bc/C/rpc"

[etherscan]
fuji = { key = "${SNOWTRACE_API_KEY}", url = "https://api.routescan.io/v2/network/testnet/evm/43113/etherscan/api" }
